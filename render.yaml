# Free-tier deploy on Render: https://render.com
# Dashboard → New → Blueprint → connect salmasaidane/oil-crack-backtest
services:
  - type: web
    name: oil-crack-backtest
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: EIA_API_KEY
        sync: false
